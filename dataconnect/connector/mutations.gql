# Campaign Lore Ingestion
mutation insertCampaignLore($content: String!, $metadata: Any) @auth(level: PUBLIC) {
  campaignLore_insert(data: {
    content: $content
    metadata: $metadata
    embedding_embed: {model: "text-embedding-004", text: $content}
  })
}
